spring.application.name=PRODUCT-SERVICE


server.port=8081

# Database connection

spring.datasource.url=jdbc:mysql://localhost:3306/product_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=Taufique@sql
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect


# Eureka Client
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.fetch-registry=true
eureka.client.register-with-eureka=true

# Eureka Instance
eureka.instance.prefer-ip-address=true

#aws
aws.access-key=ak
aws.secret-key=sk
aws.region=ap-south-1
aws.bucket-name=product-image-psa
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

